name: "New Feature Request"
description: "Suggest a new feature for the project"
labels: ["enhancement"]
assignees: []
type: feature

body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear and concise description of the new feature you would like to request.

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: A detailed description of the feature.
      placeholder: Enter the feature description
